<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Semantic — appears only inside correctness banners</div>
  <div class="row">
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="background:var(--green-50);color:var(--green-700);padding:14px 16px;border-radius:var(--radius-xl);text-align:center;font-weight:600">Correct!</div>
      <div style="display:flex;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)"><span>bg #f0fdf4</span><span>fg #15803d</span></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="background:var(--red-50);color:var(--red-700);padding:14px 16px;border-radius:var(--radius-xl);text-align:center;font-weight:600">Not quite</div>
      <div style="display:flex;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)"><span>bg #fef2f2</span><span>fg #b91c1c</span></div>
    </div>
  </div>
</div>
</body></html>
