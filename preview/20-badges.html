<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Badges — small, informational, never interactive</div>
  <div class="row" style="align-items:center;gap:10px">
    <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;background:var(--surface-2,#f4f4f5);color:var(--fg-3);font:500 12px var(--font-sans);text-transform:uppercase;letter-spacing:0.08em">restaurant</span>
    <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;background:var(--surface-2,#f4f4f5);color:var(--fg-3);font:500 12px var(--font-sans);text-transform:uppercase;letter-spacing:0.08em">transit</span>
    <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;background:var(--surface-2,#f4f4f5);color:var(--fg-2);font:500 14px var(--font-sans)">Polite form</span>
    <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;background:var(--green-50);color:var(--green-700);font:500 14px var(--font-sans)">Got it</span>
    <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;background:var(--red-50);color:var(--red-700);font:500 14px var(--font-sans)">Didn't</span>
  </div>
</div>
</body></html>
