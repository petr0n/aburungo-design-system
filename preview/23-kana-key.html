<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Kana key — single tap target, used inside KanaGrid</div>
  <div class="row" style="align-items:center;gap:14px">
    <button style="height:48px;width:48px;border-radius:12px;background:#fff;border:1px solid var(--border);box-shadow:0 1px 2px 0 rgba(24,24,27,0.05);font:500 22px var(--font-jp);color:var(--fg);cursor:pointer">あ</button>
    <button style="height:48px;width:48px;border-radius:12px;background:var(--surface);border:1px solid var(--border);box-shadow:0 1px 2px 0 rgba(24,24,27,0.05);font:500 22px var(--font-jp);color:var(--fg);cursor:pointer">い</button>
    <button style="height:48px;width:48px;border-radius:12px;background:#fff;border:1px solid var(--border);box-shadow:0 1px 2px 0 rgba(24,24,27,0.05);font:500 22px var(--font-jp);color:var(--fg);cursor:pointer">う</button>
    <span style="font-size:13px;color:var(--fg-3);margin-left:8px">Pressed = subtle <code style="font:11px var(--font-mono);color:var(--fg-3)">bg-surface</code>. No transform, no shrink.</span>
  </div>
</div>
</body></html>
