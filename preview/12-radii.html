<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Radii — rounded but never accidental</div>
  <div class="row">
    <div class="swatch" style="flex:1"><div style="height:64px;background:var(--surface);border:1px solid var(--border);border-radius:6px"></div><div class="name">sm · 6</div><div class="hex">--radius-sm</div></div>
    <div class="swatch" style="flex:1"><div style="height:64px;background:var(--surface);border:1px solid var(--border);border-radius:8px"></div><div class="name">md · 8</div><div class="hex">inputs</div></div>
    <div class="swatch" style="flex:1"><div style="height:64px;background:var(--surface);border:1px solid var(--border);border-radius:12px"></div><div class="name">lg · 12</div><div class="hex">buttons</div></div>
    <div class="swatch" style="flex:1"><div style="height:64px;background:var(--surface);border:1px solid var(--border);border-radius:16px"></div><div class="name">xl · 16</div><div class="hex">banners</div></div>
    <div class="swatch" style="flex:1"><div style="height:64px;background:var(--surface);border:1px solid var(--border);border-radius:20px"></div><div class="name">2xl · 20</div><div class="hex">cards</div></div>
    <div class="swatch" style="flex:1"><div style="height:64px;width:64px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:9999px"></div><div class="name">full</div><div class="hex">round</div></div>
  </div>
</div>
</body></html>
