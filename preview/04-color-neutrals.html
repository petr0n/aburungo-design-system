<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Neutrals — zinc. The whole UI runs on these.</div>
  <div class="row">
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-0);border-color:var(--zinc-200)"></div><div class="name">0</div><div class="hex">#ffffff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-50)"></div><div class="name">50</div><div class="hex">#fafafa</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-100)"></div><div class="name">100</div><div class="hex">#f4f4f5</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-200)"></div><div class="name">200</div><div class="hex">#e4e4e7</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-300)"></div><div class="name">300</div><div class="hex">#d4d4d8</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-400)"></div><div class="name">400</div><div class="hex">#a1a1aa</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-500)"></div><div class="name">500</div><div class="hex">#71717a</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-600)"></div><div class="name">600</div><div class="hex">#52525b</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-700)"></div><div class="name">700</div><div class="hex">#3f3f46</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--zinc-900)"></div><div class="name">900</div><div class="hex">#18181b</div></div>
  </div>
</div>
</body></html>
