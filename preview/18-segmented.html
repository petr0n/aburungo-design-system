<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Segmented toggle — three input modes</div>
  <div style="display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;max-width:420px">
    <button style="flex:1;height:36px;border-radius:8px;background:#fff;color:var(--fg);border:none;box-shadow:0 1px 2px 0 rgba(24,24,27,0.05);font:500 14px var(--font-sans);cursor:pointer">Romaji</button>
    <button style="flex:1;height:36px;border-radius:8px;background:transparent;color:var(--fg-3);border:none;font:500 14px var(--font-sans);cursor:pointer">Kana grid</button>
    <button style="flex:1;height:36px;border-radius:8px;background:transparent;color:var(--fg-3);border:none;font:500 14px var(--font-sans);cursor:pointer">JP keyboard</button>
  </div>
  <div style="font-size:13px;color:var(--fg-3)">Active = white pill with <code style="font:11px var(--font-mono);color:var(--fg-3)">shadow-sm</code>. Inactive = transparent.</div>
</div>
</body></html>
