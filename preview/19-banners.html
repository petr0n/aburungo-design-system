<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Result banners — only place green / red appears</div>
  <div class="row" style="align-items:stretch">
    <div style="flex:1;background:var(--green-50);color:var(--green-700);padding:16px;border-radius:16px;text-align:center">
      <div style="font-size:18px;font-weight:600">Correct!</div>
    </div>
    <div style="flex:1;background:var(--red-50);color:var(--red-700);padding:16px;border-radius:16px;text-align:center">
      <div style="font-size:18px;font-weight:600">Not quite</div>
      <div lang="ja" style="font-family:var(--font-jp);font-size:14px;color:var(--red-500);margin-top:4px">You answered: えきがどこですか</div>
    </div>
  </div>
</div>
</body></html>
