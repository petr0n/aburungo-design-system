<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Phrase specimen — how the three lines stack on a card</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 0">
    <p lang="ja" style="font-family:var(--font-jp);font-size:36px;font-weight:500;line-height:1.4;color:var(--fg);margin:0">お会計お願いします</p>
    <p lang="ja" style="font-family:var(--font-jp);font-size:18px;font-weight:400;line-height:1.5;color:var(--fg-2);margin:0">おかいけいおねがいします</p>
    <p style="font-size:14px;font-style:italic;color:var(--fg-3);margin:0">okaikei onegai shimasu</p>
    <hr style="width:80%;border:none;border-top:1px solid var(--border);margin:6px 0">
    <p style="font-size:18px;color:var(--fg);margin:0">The check, please.</p>
  </div>
</div>
</body></html>
