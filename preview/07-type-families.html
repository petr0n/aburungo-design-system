<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:18px">
  <div class="label">Type families</div>
  <div style="display:flex;gap:24px;align-items:flex-start">
    <div style="flex:1;display:flex;flex-direction:column;gap:4px">
      <div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">--font-sans · Noto Sans</div>
      <div style="font-family:var(--font-sans);font-size:30px;font-weight:700;line-height:1.1;letter-spacing:-0.02em">Ready to use Japanese.</div>
      <div style="font-family:var(--font-sans);font-size:14px;color:var(--fg-3)">English UI copy. 400 / 500 / 600 / 700.</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:4px">
      <div style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">--font-jp · M PLUS Rounded 1c</div>
      <div lang="ja" style="font-family:var(--font-jp);font-size:30px;font-weight:500;line-height:1.4">駅はどこですか</div>
      <div style="font-family:var(--font-sans);font-size:14px;color:var(--fg-3)">Japanese content. 400 / 500 / 700.</div>
    </div>
  </div>
</div>
</body></html>
