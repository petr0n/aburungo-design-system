<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:12px">
  <div class="label">Japanese type scale — M PLUS Rounded 1c. Larger line-height for kanji.</div>
  <div style="display:grid;grid-template-columns:110px 1fr auto;gap:10px 16px;align-items:baseline" lang="ja">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">jp-display-lg</span>
    <span style="font-family:var(--font-jp);font-size:40px;font-weight:500;line-height:1.4">お会計お願いします</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">40 / 500</span>

    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">jp-display</span>
    <span style="font-family:var(--font-jp);font-size:32px;font-weight:500;line-height:1.4">駅はどこですか</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">32 / 500</span>

    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">jp-lg</span>
    <span style="font-family:var(--font-jp);font-size:24px;font-weight:500;line-height:1.5">次の電車は何時ですか</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">24 / 500</span>

    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">jp (reading)</span>
    <span style="font-family:var(--font-jp);font-size:18px;font-weight:400;line-height:1.55;color:var(--fg-2)">えきはどこですか</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">18 / 400</span>
  </div>
</div>
</body></html>
