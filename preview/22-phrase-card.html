<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:var(--surface);padding:20px">
  <article class="demo-card" style="padding:24px;display:flex;flex-direction:column;gap:18px">
    <header style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
      <span style="font:500 12px var(--font-sans);text-transform:uppercase;letter-spacing:0.08em;color:var(--fg-3)">restaurant</span>
      <button aria-label="Play audio" style="height:44px;width:44px;border-radius:9999px;background:#fff;border:1px solid var(--border);color:var(--fg-2);display:inline-flex;align-items:center;justify-content:center">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
      </button>
    </header>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center">
      <p lang="ja" style="font-family:var(--font-jp);font-size:36px;font-weight:500;line-height:1.4;margin:0">これをください</p>
      <p lang="ja" style="font-family:var(--font-jp);font-size:18px;color:var(--fg-2);margin:0">これをください</p>
      <p style="font-size:14px;font-style:italic;color:var(--fg-3);margin:0">kore o kudasai</p>
    </div>
    <hr style="border:none;border-top:1px solid var(--border)">
    <p style="font-size:18px;text-align:center;margin:0">I'll have this.</p>
  </article>
</div>
</body></html>
