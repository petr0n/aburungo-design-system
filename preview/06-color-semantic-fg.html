<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Semantic foreground tokens</div>
  <div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px 20px;align-items:center;font-size:14px">
    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:12px">--fg</span>
    <span style="color:var(--fg);font-weight:600">Primary text — body, headlines, buttons</span>
    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">#18181b</span>

    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:12px">--fg-2</span>
    <span style="color:var(--fg-2)">Labels, secondary copy, secondary button text</span>
    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">#3f3f46</span>

    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:12px">--fg-3</span>
    <span style="color:var(--fg-3)">Meta, hints, authoring notes</span>
    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">#71717a</span>

    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:12px">--fg-4</span>
    <span style="color:var(--fg-4)">Placeholders, inactive states</span>
    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">#a1a1aa</span>

    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:12px">--accent</span>
    <span style="color:var(--brand-500);font-weight:600">Brand purple — auth CTA, focus ring, logo</span>
    <span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">#aa3bff</span>
  </div>
</div>
</body></html>
