<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body, .hero-card * { font-family: "Noto Sans", system-ui, -apple-system, sans-serif; }
  .hero-card .jp { font-family: "M PLUS Rounded 1c", "Hiragino Kaku Gothic ProN", sans-serif; }
</style>
</head>
<body>
<div class="hero-card card" style="flex-direction:row;align-items:center;gap:28px;padding:24px 28px">
  <!-- Hero surface: card image + a Japanese-character overlay sitting alongside the stack -->
  <div style="flex-shrink:0;width:180px;height:180px;position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fafafa,#f4f4f5);border:1px solid var(--border);border-radius:var(--radius-2xl);overflow:hidden">
    <img src="../assets/hero.png" alt="AburunGo stacked-card hero with 日本語 kanji" width="148" height="148" style="user-select:none;display:block;position:relative;z-index:2;filter:drop-shadow(0 6px 14px rgba(126,20,255,0.18))">
    <!-- Background kanji — large, low-contrast, sits behind the stack like a watermark -->
    <span lang="ja" aria-hidden="true" class="jp"
          style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:108px;font-weight:700;color:var(--brand-700);opacity:0.10;letter-spacing:-0.04em;line-height:1;user-select:none;z-index:1;transform:translate(-6px,2px)">日本語</span>
  </div>

  <div style="display:flex;flex-direction:column;gap:6px;min-width:0;flex:1">
    <div style="font-size:11px;font-weight:600;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em">Brand illustration</div>
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <div style="font-size:22px;font-weight:700;letter-spacing:-0.01em;color:var(--fg);line-height:1.2">Stacked cards</div>
      <span lang="ja" class="jp" style="font-size:20px;font-weight:500;color:var(--brand-700);line-height:1.2">日本語</span>
    </div>
    <div style="font-size:14px;line-height:1.55;color:var(--fg-2);max-width:360px">Violet metallic foreground card with a dashed ghost stack, anchored by the kanji for "Japanese" (<span lang="ja" class="jp">日本語</span>). Appears on the landing screen at 220×220.</div>
    <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
      <span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;background:var(--surface-2,#f4f4f5);color:var(--fg-3);font-size:12px;font-weight:500;font-family:ui-monospace,SFMono-Regular,Menlo,monospace">assets/hero.png</span>
      <span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;background:var(--surface-2,#f4f4f5);color:var(--fg-3);font-size:12px;font-weight:500">PNG · 360×360</span>
      <span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;background:var(--brand-50);color:var(--brand-700);font-size:12px;font-weight:500">MVP — full redesign later</span>
    </div>
  </div>
</div>
</body>
</html>
