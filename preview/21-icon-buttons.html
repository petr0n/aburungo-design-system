<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Icon buttons — round, 44px, filled SVG inside</div>
  <div class="row" style="align-items:center;gap:16px">
    <button aria-label="Play audio" style="height:44px;width:44px;border-radius:9999px;background:#fff;border:1px solid var(--border);color:var(--fg-2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z"/></svg>
    </button>
    <button aria-label="Microphone" style="height:56px;width:56px;border-radius:9999px;background:#fff;border:2px solid var(--border-strong);color:var(--fg-2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm6-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button aria-label="Listening" style="height:56px;width:56px;border-radius:9999px;background:var(--red-500);border:none;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative">
      <span style="position:absolute;inset:-8px;border-radius:9999px;background:rgba(239,68,68,0.3);animation:ping 1.4s cubic-bezier(0,0,0.2,1) infinite"></span>
      <svg viewBox="0 0 24 24" width="24" height="24" style="position:relative"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm6-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button aria-label="Backspace" style="height:44px;width:44px;border-radius:12px;background:#fff;border:1px solid var(--border);color:var(--fg-2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 1px 2px 0 rgba(24,24,27,0.05)">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
    </button>
    <span style="font-size:12px;color:var(--fg-3);font-family:var(--font-mono);margin-left:8px">audio · mic-idle · mic-listening · backspace</span>
  </div>
  <style>@keyframes ping{75%,100%{transform:scale(1.4);opacity:0}}</style>
</div>
</body></html>
