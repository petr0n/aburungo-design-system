<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Touch targets — every interactive element is ≥ 44px tall</div>
  <div style="display:flex;align-items:flex-end;gap:24px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="height:44px;width:120px;background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--fg-3);font-size:12px;font-family:var(--font-mono)">44 × 120</div>
      <div style="font-size:11px;color:var(--fg-3)">min height</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="height:48px;width:160px;background:var(--fg);color:#fff;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-weight:500">Check answer</div>
      <div style="font-size:11px;color:var(--fg-3)">48 — primary CTA</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="height:44px;width:44px;background:#fff;border:1px solid var(--border);border-radius:9999px;display:flex;align-items:center;justify-content:center;color:var(--fg-2)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
      </div>
      <div style="font-size:11px;color:var(--fg-3)">44 — icon</div>
    </div>
  </div>
</div>
</body></html>
