<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Empty state — what "done" looks like. No fanfare.</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;padding:20px 0">
    <p style="font-size:22px;font-weight:600;margin:0">All caught up!</p>
    <p style="font-size:15px;color:var(--fg-3);margin:0">No phrases due for review right now.</p>
    <button style="margin-top:8px;height:48px;padding:0 24px;border-radius:12px;background:#fff;color:var(--fg-2);border:1px solid var(--border-strong);font:500 16px var(--font-sans);cursor:pointer">Start over</button>
  </div>
</div>
</body></html>
