<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="gap:14px">
  <div class="label">Spacing — 4px base. Use these stops; don't invent in-betweens.</div>
  <div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px 16px;align-items:center;font-size:13px">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">1</span><div style="height:8px;width:4px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">4px · inline icon gap</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">2</span><div style="height:8px;width:8px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">8px · grid gap (kana keys)</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">3</span><div style="height:8px;width:12px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">12px · button gap, form gap</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">4</span><div style="height:8px;width:16px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">16px · screen padding, paragraph spacing</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">6</span><div style="height:8px;width:24px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">24px · card padding, card-section gap</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">8</span><div style="height:8px;width:32px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">32px · landing gap (hero/title)</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">12</span><div style="height:8px;width:48px;background:var(--brand-500);border-radius:2px"></div><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">48px · vertical screen padding</span>
  </div>
</div>
</body></html>
