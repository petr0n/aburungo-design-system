<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Progress bar — 0–1, no numbers, no labels, no celebrations</div>
  <div style="display:flex;flex-direction:column;gap:14px">
    <div role="progressbar" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0.12" style="height:4px;background:var(--surface-2,#f4f4f5);border-radius:9999px;overflow:hidden"><div style="width:12%;height:100%;background:var(--brand-500)"></div></div>
    <div role="progressbar" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0.4" style="height:4px;background:var(--surface-2,#f4f4f5);border-radius:9999px;overflow:hidden"><div style="width:40%;height:100%;background:var(--brand-500)"></div></div>
    <div role="progressbar" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0.75" style="height:4px;background:var(--surface-2,#f4f4f5);border-radius:9999px;overflow:hidden"><div style="width:75%;height:100%;background:var(--brand-500)"></div></div>
    <div role="progressbar" aria-valuemin="0" aria-valuemax="1" aria-valuenow="1" style="height:4px;background:var(--surface-2,#f4f4f5);border-radius:9999px;overflow:hidden"><div style="width:100%;height:100%;background:var(--brand-500)"></div></div>
  </div>
</div>
</body></html>
