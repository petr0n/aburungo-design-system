<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Buttons — three variants, two sizes. All ≥ 44px.</div>
  <div class="row" style="align-items:center">
    <button class="btn" style="height:48px;padding:0 20px;border-radius:12px;background:var(--fg);color:#fff;border:none;font:500 16px var(--font-sans);cursor:pointer">Check answer</button>
    <button class="btn" style="height:48px;padding:0 20px;border-radius:12px;background:#fff;color:var(--fg-2);border:1px solid var(--border-strong);font:500 16px var(--font-sans);cursor:pointer">Show answer</button>
    <button class="btn" style="height:44px;padding:0 16px;border-radius:8px;background:transparent;color:var(--fg-2);border:none;font:500 14px var(--font-sans);cursor:pointer">Sign out</button>
    <button class="btn" style="height:48px;padding:0 20px;border-radius:12px;background:var(--fg);color:#fff;border:none;font:500 16px var(--font-sans);opacity:0.4;cursor:not-allowed">Disabled</button>
  </div>
  <div style="display:flex;gap:24px;font-size:11px;color:var(--fg-3);font-family:var(--font-mono)">
    <span>primary · md</span><span>secondary · md</span><span>ghost · sm</span><span>disabled</span>
  </div>
</div>
</body></html>
