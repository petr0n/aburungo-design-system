<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Brand — purple. The only accent. Use sparingly.</div>
  <div class="row">
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-50)"></div><div class="name">50</div><div class="hex">#f5efff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-100)"></div><div class="name">100</div><div class="hex">#ede6ff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-200)"></div><div class="name">200</div><div class="hex">#dccaff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-300)"></div><div class="name">300</div><div class="hex">#c4a5ff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-400)"></div><div class="name">400</div><div class="hex">#aa7bff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-500);outline:2px solid var(--brand-700);outline-offset:-4px;border-radius:var(--radius-lg)"></div><div class="name" style="color:var(--brand-700)">500 ●</div><div class="hex">#aa3bff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-600)"></div><div class="name">600</div><div class="hex">#863bff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-700)"></div><div class="name">700</div><div class="hex">#7e14ff</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-800)"></div><div class="name">800</div><div class="hex">#5e0bbf</div></div>
    <div class="swatch" style="flex:1"><div class="chip" style="background:var(--brand-900)"></div><div class="name">900</div><div class="hex">#3d077a</div></div>
  </div>
</div>
</body></html>
