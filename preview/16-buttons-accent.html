<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Accent CTA — brand purple is reserved for auth + marketing</div>
  <div class="row" style="align-items:center;gap:16px">
    <button style="height:48px;padding:0 24px;border-radius:8px;background:var(--brand-500);color:#fff;border:none;font:600 16px var(--font-sans);cursor:pointer">Create account</button>
    <button style="height:48px;padding:0 24px;border-radius:8px;background:var(--brand-500);color:#fff;border:none;font:600 16px var(--font-sans);opacity:0.8;cursor:pointer">Create account</button>
    <span style="font-size:13px;color:var(--fg-3);max-width:240px">Hover does nothing. Press = <code style="font:11px var(--font-mono);color:var(--fg-3)">opacity 0.8</code>. Never bg-shift, never shrink.</span>
  </div>
</div>
</body></html>
