<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Text input — label, control, optional hint or error</div>
  <div class="row" style="align-items:flex-start">
    <div style="flex:1;display:flex;flex-direction:column;gap:4px">
      <label style="font-size:14px;font-weight:500;color:var(--fg-2)">Email</label>
      <input type="email" placeholder="you@example.com" value="" style="min-height:44px;border:1px solid var(--border-strong);border-radius:8px;padding:8px 12px;font:400 16px var(--font-sans);color:var(--fg)">
      <p style="font-size:13px;color:var(--fg-3);margin:2px 0 0">We never share this.</p>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:4px">
      <label style="font-size:14px;font-weight:500;color:var(--fg-2)">Password</label>
      <input type="password" value="hunter2" style="min-height:44px;border:1px solid var(--red-500);border-radius:8px;padding:8px 12px;font:400 16px var(--font-sans);color:var(--fg)">
      <p role="alert" style="font-size:13px;color:var(--red-700);margin:2px 0 0">Must be at least 8 characters.</p>
    </div>
  </div>
</div>
</body></html>
