<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AburunGo — Desktop exploration</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap">
  <style>
    @font-face {
      font-family: "Noto Sans"; font-style: normal; font-weight: 100 900; font-display: swap;
      src: url("../fonts/NotoSans-VariableFont_wdth_wght.ttf") format("truetype-variations"),
           url("../fonts/NotoSans-VariableFont_wdth_wght.ttf") format("truetype");
    }
    @font-face {
      font-family: "Noto Sans"; font-style: italic; font-weight: 100 900; font-display: swap;
      src: url("../fonts/NotoSans-Italic-VariableFont_wdth_wght.ttf") format("truetype-variations"),
           url("../fonts/NotoSans-Italic-VariableFont_wdth_wght.ttf") format("truetype");
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-brand-50: #f5efff; --color-brand-100: #ede6ff; --color-brand-200: #dccaff;
      --color-brand-300: #c4a5ff; --color-brand-400: #aa7bff; --color-brand-500: #aa3bff;
      --color-brand-600: #863bff; --color-brand-700: #7e14ff; --color-brand-800: #5e0bbf;
      --color-bg: #ffffff; --color-surface: #fafafa; --color-surface-2: #f4f4f5;
      --color-fg: #18181b; --color-fg-muted: #52525b; --color-fg-subtle: #71717a;
      --color-fg-faint: #a1a1aa; --color-fg-inverse: #ffffff;
      --color-border: #e4e4e7; --color-border-strong: #d4d4d8;
      --color-success-bg: #f0fdf4; --color-success-fg: #15803d; --color-success-500: #22c55e;
      --color-error-bg: #fef2f2; --color-error-fg: #b91c1c; --color-error-500: #ef4444;
      --font-sans: "Noto Sans", system-ui, -apple-system, sans-serif;
      --font-jp: "M PLUS Rounded 1c", "Hiragino Kaku Gothic ProN", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;

      --text-caption: 0.75rem; --text-caption--line-height: 1rem; --text-caption--font-weight: 500;
      --text-body-sm: 0.875rem; --text-body-sm--line-height: 1.25rem;
      --text-body: 1rem; --text-body--line-height: 1.5rem;
      --text-body-lg: 1.125rem; --text-body-lg--line-height: 1.625rem;
      --text-heading-sm: 1.25rem; --text-heading-sm--line-height: 1.625rem; --text-heading-sm--font-weight: 600;
      --text-heading: 1.5rem; --text-heading--line-height: 1.875rem; --text-heading--font-weight: 600;
      --text-heading-lg: 1.875rem; --text-heading-lg--line-height: 2.25rem; --text-heading-lg--font-weight: 600;
      --text-display: 2.25rem; --text-display--line-height: 2.5rem; --text-display--font-weight: 700;
      --text-display-lg: 3rem; --text-display-lg--line-height: 3.25rem; --text-display-lg--font-weight: 700;
      --text-jp: 1.125rem; --text-jp--line-height: 1.75rem;
      --text-jp-lg: 1.5rem; --text-jp-lg--line-height: 2.25rem; --text-jp-lg--font-weight: 500;
      --text-jp-display: 2rem; --text-jp-display--line-height: 3rem; --text-jp-display--font-weight: 500;
      --text-jp-display-lg: 2.5rem; --text-jp-display-lg--line-height: 3.5rem; --text-jp-display-lg--font-weight: 500;
      --text-jp-hero: 4.5rem; --text-jp-hero--line-height: 5.25rem; --text-jp-hero--font-weight: 500;

      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
      --radius-xl: 1rem; --radius-2xl: 1.25rem; --radius-3xl: 1.75rem;

      --shadow-card: 0 1px 2px 0 rgb(24 24 27 / 0.05);
      --shadow-key: 0 1px 2px 0 rgb(24 24 27 / 0.04);
      --shadow-lg: 0 10px 32px -8px rgb(24 24 27 / 0.10), 0 2px 6px -2px rgb(24 24 27 / 0.06);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <style>html, body { margin: 0; min-height: 100vh; background: #f4f1f7; }</style>
</head>
<body>
  <div id="root"></div>

  <!-- Shared primitives (Button, PhraseCard, KanaGrid, etc) -->
  <script type="text/babel" src="mobile/components.jsx"></script>

  <!-- Design canvas host -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- Desktop screen variants -->
  <script type="text/babel" src="desktop-screens.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas storageKey="aburungo-desktop-explore" background="#f4f1f7">
          <DCSection id="review" title="Review screen — desktop directions"
                     subtitle="Same components, three different desktop shapes. Drag to reorder, click to focus.">
            <DCArtboard id="centered" label="A · Centered narrow" width={1280} height={820}>
              <CenteredVariant/>
            </DCArtboard>
            <DCArtboard id="twopane" label="B · Two-pane app" width={1280} height={820}>
              <TwoPaneVariant/>
            </DCArtboard>
            <DCArtboard id="focus" label="C · Focused (big type + shortcuts)" width={1280} height={820}>
              <FocusVariant/>
            </DCArtboard>
          </DCSection>

          <DCSection id="landing" title="Landing — desktop"
                     subtitle="Two options for the marketing landing.">
            <DCArtboard id="landing-hero" label="Hero + side illustration" width={1280} height={820}>
              <LandingHeroVariant/>
            </DCArtboard>
            <DCArtboard id="landing-stacked" label="Stacked / centered" width={1280} height={820}>
              <LandingStackedVariant/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
